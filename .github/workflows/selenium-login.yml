name: Test & Deploy Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Web E2E Tests → web_test_report.xlsx
  # ──────────────────────────────────────────────
  selenium-tests:
    name: Web E2E Tests (250 Cases)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install workspace dependencies
        working-directory: ./tracknova
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: ./tracknova/frontend
        env:
          BASE_PATH: /
        run: pnpm run build

      - name: Start local frontend server
        run: |
          python -m http.server 3000 --directory tracknova/frontend/dist/public &
          sleep 5

      - name: Install Selenium test dependencies
        working-directory: ./selenium-tests
        run: npm ci

      - name: Run Selenium E2E tests + generate Excel report
        working-directory: ./selenium-tests
        env:
          TEST_URL: http://localhost:3000
        run: node run_tests.js

      - name: Copy report for upload
        run: cp selenium-tests/report.xlsx reports/web_test_report.xlsx

      - name: Upload Web E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: Web-E2E-Report
          path: reports/web_test_report.xlsx

  # ──────────────────────────────────────────────
  # JOB 2: Mobile E2E Tests → mobile_test_report.xlsx
  # ──────────────────────────────────────────────
  appium-tests:
    name: Mobile E2E Tests (250 Cases)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        working-directory: ./mobile/appium-tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install global Appium
        run: npm i -g appium

      - name: Start Appium server
        run: |
          appium &
          sleep 5

      - name: Run Appium tests + generate Excel report
        working-directory: ./mobile/appium-tests
        run: python run_tests.py

      - name: Copy report for upload
        run: cp mobile/appium-tests/report.xlsx reports/mobile_test_report.xlsx

      - name: Upload Mobile E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-E2E-Report
          path: reports/mobile_test_report.xlsx

  # ──────────────────────────────────────────────
  # JOB 3: API Load Testing
  # ──────────────────────────────────────────────
  load-tests:
    name: API Load Testing
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: tracknova
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install workspace dependencies
        working-directory: ./tracknova
        run: pnpm install --no-frozen-lockfile

      - name: Push DB Schema
        working-directory: ./tracknova
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/tracknova
        run: pnpm --filter @workspace/db run push

      - name: Seed DB
        working-directory: ./tracknova
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/tracknova
        run: pnpm --filter @workspace/db run seed

      - name: Start API Server
        working-directory: ./tracknova
        env:
          PORT: 8081
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/tracknova
          SESSION_SECRET: CI-test-secret
          CLERK_SECRET_KEY: mock-key
          CLERK_PUBLISHABLE_KEY: mock-pub-key
          VITE_CLERK_PUBLISHABLE_KEY: mock-pub-key
        run: |
          pnpm --filter @workspace/api-server run dev &
          sleep 5

      - name: Run Baseline Load Test (/api/healthz)
        run: node scripts/load_test.js --url http://localhost:8081/api/healthz --concurrency 100 --duration 15 --output reports/healthz_load_test.txt

      - name: Run DB-Backed Load Test (/api/dashboard/summary)
        run: node scripts/load_test.js --url http://localhost:8081/api/dashboard/summary --concurrency 100 --duration 15 --output reports/dashboard_load_test.txt

      - name: Print Results
        run: |
          echo "=== Healthz Load Test ==="
          cat reports/healthz_load_test.txt
          echo "=== Dashboard Load Test ==="
          cat reports/dashboard_load_test.txt

      - name: Save Load Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: API-Load-Test-Reports
          path: |
            reports/healthz_load_test.txt
            reports/dashboard_load_test.txt

  # ──────────────────────────────────────────────
  # JOB 3.5: API Functional Tests (250 Cases) → api_test_report.xlsx
  # ──────────────────────────────────────────────
  api-tests:
    name: API Functional Tests (250 Cases)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: tracknova
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install workspace dependencies
        working-directory: ./tracknova
        run: pnpm install --no-frozen-lockfile

      - name: Push DB Schema
        working-directory: ./tracknova
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/tracknova
        run: pnpm --filter @workspace/db run push

      - name: Seed DB
        working-directory: ./tracknova
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/tracknova
        run: pnpm --filter @workspace/db run seed

      - name: Start API Server
        working-directory: ./tracknova
        env:
          PORT: 8081
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/tracknova
          SESSION_SECRET: CI-test-secret
          CLERK_SECRET_KEY: mock-key
          CLERK_PUBLISHABLE_KEY: mock-pub-key
          VITE_CLERK_PUBLISHABLE_KEY: mock-pub-key
        run: |
          pnpm --filter @workspace/api-server run dev &
          sleep 5

      - name: Install API test dependencies
        working-directory: ./api-tests
        run: npm ci

      - name: Run API tests + generate Excel report
        working-directory: ./api-tests
        env:
          API_URL: http://localhost:8081
        run: node run_tests.js

      - name: Copy report for upload
        run: |
          mkdir -p reports
          cp api-tests/report.xlsx reports/api_test_report.xlsx

      - name: Upload API Report
        uses: actions/upload-artifact@v4
        with:
          name: API-E2E-Report
          path: reports/api_test_report.xlsx

  # ──────────────────────────────────────────────
  # JOB 4: Deploy frontend to GitHub Pages
  # ──────────────────────────────────────────────
  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: [selenium-tests, appium-tests, api-tests, load-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        working-directory: ./tracknova
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: ./tracknova/frontend
        run: pnpm run build

      - name: Deploy to GitHub Pages
        working-directory: ./tracknova/frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          pnpm run deploy
