name: Test & Deploy Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Web E2E Tests → web_test_report.xlsx
  # ──────────────────────────────────────────────
  selenium-tests:
    name: Web E2E Tests (100 Cases)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install workspace dependencies
        working-directory: ./tracknova
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: ./tracknova/frontend
        env:
          BASE_PATH: /
        run: pnpm run build

      - name: Start local frontend server
        run: |
          python -m http.server 3000 --directory tracknova/frontend/dist/public &
          sleep 5

      - name: Install Selenium test dependencies
        working-directory: ./selenium-tests
        run: npm ci

      - name: Run Selenium E2E tests + generate Excel report
        working-directory: ./selenium-tests
        env:
          TEST_URL: http://localhost:3000
        run: node run_tests.js || true

      - name: Rename report for upload
        run: cp selenium-tests/report.xlsx web_test_report.xlsx

      - name: Upload Web E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: Web-E2E-Report
          path: web_test_report.xlsx

  # ──────────────────────────────────────────────
  # JOB 2: Mobile E2E Tests → mobile_test_report.xlsx
  # ──────────────────────────────────────────────
  appium-tests:
    name: Mobile E2E Tests (100 Cases)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        working-directory: ./mobile/appium-tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install global Appium
        run: npm i -g appium

      - name: Start Appium server
        run: |
          appium &
          sleep 5

      - name: Run Appium tests + generate Excel report
        working-directory: ./mobile/appium-tests
        run: python run_tests.py || true

      - name: Rename report for upload
        run: cp mobile/appium-tests/report.xlsx mobile_test_report.xlsx

      - name: Upload Mobile E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-E2E-Report
          path: mobile_test_report.xlsx

  # ──────────────────────────────────────────────
  # JOB 3: Deploy frontend to GitHub Pages
  # ──────────────────────────────────────────────
  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: selenium-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        working-directory: ./tracknova
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: ./tracknova/frontend
        run: pnpm run build

      - name: Deploy to GitHub Pages
        working-directory: ./tracknova/frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          pnpm run deploy
