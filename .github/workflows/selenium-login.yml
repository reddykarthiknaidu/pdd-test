name: Test & Deploy Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ────────────────────────────────────────────────
  # JOB 1: Generate Web Report (100 test cases)
  # ────────────────────────────────────────────────
  generate-web-report:
    name: Generate Web E2E Report (100 Cases)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Generate Web Excel Report
        run: python scripts/generate_reports.py

      - name: Upload Web Report
        uses: actions/upload-artifact@v4
        with:
          name: Web-E2E-Report
          path: reports/web_test_report.xlsx

  # ────────────────────────────────────────────────
  # JOB 2: Generate Mobile Report (100 test cases)
  # ────────────────────────────────────────────────
  generate-mobile-report:
    name: Generate Mobile E2E Report (100 Cases)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Generate Mobile Excel Report
        run: python scripts/generate_reports.py

      - name: Upload Mobile Report
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-E2E-Report
          path: reports/mobile_test_report.xlsx

  # ────────────────────────────────────────────────
  # JOB 3: Selenium E2E Web Tests
  # ────────────────────────────────────────────────
  selenium-tests:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install workspace dependencies
        working-directory: ./tracknova
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: ./tracknova/frontend
        env:
          BASE_PATH: /
        run: pnpm run build

      - name: Start Local Server
        run: |
          python -m http.server 3000 --directory tracknova/frontend/dist/public &
          sleep 3

      - name: Install npm dependencies (Selenium)
        working-directory: ./selenium-tests
        run: npm ci

      - name: Run Selenium tests
        working-directory: ./selenium-tests
        env:
          TEST_URL: http://localhost:3000
        run: node run_tests.js

      - name: Upload Selenium Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Test-Report
          path: ./selenium-tests/report.xlsx

  # ────────────────────────────────────────────────
  # JOB 4: Appium Mobile Tests (Dry-Run)
  # ────────────────────────────────────────────────
  appium-tests:
    name: Appium Mobile Tests Dry-Run
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        working-directory: ./mobile/appium-tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install global Appium
        run: npm i -g appium

      - name: Start Appium server
        run: |
          appium &
          sleep 3

      - name: Run Appium tests
        working-directory: ./mobile/appium-tests
        run: python run_tests.py

      - name: Upload Appium Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Test-Report
          path: ./mobile/appium-tests/report.xlsx

  # ────────────────────────────────────────────────
  # JOB 5: Deploy to GitHub Pages
  # ────────────────────────────────────────────────
  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: selenium-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        working-directory: ./tracknova
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: ./tracknova/frontend
        run: pnpm run build

      - name: Deploy to GitHub Pages
        working-directory: ./tracknova/frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          pnpm run deploy
