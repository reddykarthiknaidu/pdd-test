name: Test & Deploy Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ────────────────────────────────────────────────
  # JOB 1: Selenium E2E Web Tests (100 real tests)
  # ────────────────────────────────────────────────
  selenium-tests:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install workspace dependencies
        working-directory: ./tracknova
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: ./tracknova/frontend
        env:
          BASE_PATH: /
        run: pnpm run build

      - name: Start Local Server
        run: |
          python -m http.server 3000 --directory tracknova/frontend/dist/public &
          sleep 3

      - name: Install npm dependencies (Selenium)
        working-directory: ./selenium-tests
        run: npm ci

      - name: Run Selenium tests and generate Excel report
        working-directory: ./selenium-tests
        env:
          TEST_URL: http://localhost:3000
        run: node run_tests.js || true

      - name: Upload Selenium Web Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Web-E2E-Report
          path: ./selenium-tests/report.xlsx

  # ────────────────────────────────────────────────
  # JOB 2: Appium Mobile Tests (100 test cases)
  # ────────────────────────────────────────────────
  appium-tests:
    name: Appium Mobile Tests Dry-Run
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        working-directory: ./mobile/appium-tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install global Appium
        run: npm i -g appium

      - name: Start Appium server
        run: |
          appium &
          sleep 3

      - name: Run Appium tests and generate Excel report
        working-directory: ./mobile/appium-tests
        run: python run_tests.py || true

      - name: Upload Mobile App Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-E2E-Report
          path: ./mobile/appium-tests/report.xlsx

  # ────────────────────────────────────────────────
  # JOB 3: Generate Combined Reports (both web + mobile)
  # ────────────────────────────────────────────────
  generate-reports:
    name: Generate Combined Test Reports
    needs: [selenium-tests, appium-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Generate Both Excel Reports (Web + Mobile)
        run: python scripts/generate_reports.py

      - name: Upload Web Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: Web-100-TestCases-Report
          path: reports/web_test_report.xlsx

      - name: Upload Mobile Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-100-TestCases-Report
          path: reports/mobile_test_report.xlsx

      - name: Download Selenium live report
        uses: actions/download-artifact@v4
        with:
          name: Web-E2E-Report
          path: live-selenium-report
        continue-on-error: true

      - name: Download Mobile live report
        uses: actions/download-artifact@v4
        with:
          name: Mobile-E2E-Report
          path: live-mobile-report
        continue-on-error: true

      - name: Generate Combined Lifelink Report
        run: |
          python -c '
          import os, openpyxl

          wb_new = openpyxl.Workbook()
          wb_new.remove(wb_new.active)

          for name, path in [("Web", "reports/web_test_report.xlsx"), ("Mobile", "reports/mobile_test_report.xlsx")]:
              if os.path.exists(path):
                  wb = openpyxl.load_workbook(path)
                  for sn in wb.sheetnames:
                      ws_old = wb[sn]
                      ws_new = wb_new.create_sheet(title=f"{name} - {sn}")
                      for row in ws_old.iter_rows(values_only=True):
                          ws_new.append(row)

          wb_new.save("lifelink_test_report.xlsx")
          print("Combined report saved: lifelink_test_report.xlsx")
          '

      - name: Upload Combined Report
        uses: actions/upload-artifact@v4
        with:
          name: Combined-Lifelink-Test-Report
          path: lifelink_test_report.xlsx

  # ────────────────────────────────────────────────
  # JOB 4: Deploy to GitHub Pages
  # ────────────────────────────────────────────────
  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: selenium-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        working-directory: ./tracknova
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: ./tracknova/frontend
        run: pnpm run build

      - name: Deploy to GitHub Pages
        working-directory: ./tracknova/frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          pnpm run deploy
